name: GitHub Pages

# Deploy the static site whenever main changes or on manual trigger.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write        # required to deploy to GitHub Pages
  id-token: write     # required by actions/deploy-pages OIDC

# Allow only one concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build HTML site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          PANDOC_VERSION="3.2.1"
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" \
            -o /tmp/pandoc.deb
          sudo dpkg -i /tmp/pandoc.deb

      - name: Build HTML (English)
        run: bash scripts/build.sh en --html-only

      - name: Build HTML (Traditional Chinese)
        run: bash scripts/build.sh zh-TW --html-only

      - name: Create index page
        run: bash scripts/build_index.sh

      - name: Assemble site
        run: |
          mkdir -p _site
          cp dist/data-structures-in-practice-en.html    _site/en.html
          cp dist/data-structures-in-practice-zh-TW.html _site/zh-TW.html
          cp dist/index.html                             _site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
