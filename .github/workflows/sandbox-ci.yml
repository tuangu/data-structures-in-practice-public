name: Sandbox CI

on:
  push:
    branches: ["main", "claude/**"]
    paths:
      - "sandbox/**"
  pull_request:
    paths:
      - "sandbox/**"
  workflow_dispatch:

jobs:
  build:
    name: Cross-compile exercises and solutions
    runs-on: ubuntu-24.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────── #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install cross toolchain ───────────────────────────────────────── #
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu \
            libc6-dev-riscv64-cross \
            make

      # ── 3. Build all exercises/solutions for RISC-V ─────────────────────── #
      - name: Build (ARCH=riscv64)
        working-directory: sandbox
        run: make ARCH=riscv64 all

      # ── 4. Build all exercises/solutions for x86_64 ─────────────────────── #
      - name: Build (ARCH=x86_64)
        working-directory: sandbox
        run: make ARCH=x86_64 all
